<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Меню ресторана | Заказ еды</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #ffffff;
        font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', sans-serif;
        line-height: 1.4;
        color: #1a1a1a;
        min-height: 100vh;
        padding: 1.5rem;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    /* Шапка */
    .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #f0f2f5;
    }

    .header h1 {
        font-size: 1.8rem;
        font-weight: 550;
        letter-spacing: -0.3px;
    }

    .cart-icon {
        position: relative;
        cursor: pointer;
        background: #f8f9fc;
        padding: 0.7rem 1.2rem;
        border-radius: 40px;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: 0.2s;
        border: 1px solid #e2e6ea;
    }

    .cart-icon:hover {
        background: #f0f2f5;
    }

    .cart-count {
        background: #000;
        color: white;
        border-radius: 30px;
        padding: 0.2rem 0.6rem;
        font-size: 0.75rem;
        font-weight: 500;
    }

    /* Выбор ресторана */
    .restaurant-section {
        margin-bottom: 2rem;
    }

    .restaurant-selector {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        align-items: center;
    }

    .restaurant-selector label {
        font-weight: 500;
        color: #2c2c2c;
    }

    select {
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        font-family: inherit;
        background: #ffffff;
        border: 1px solid #e2e6ea;
        border-radius: 16px;
        outline: none;
        cursor: pointer;
        min-width: 250px;
    }

    select:focus {
        border-color: #a0a8b2;
    }

    /* Информация о ресторане */
    .restaurant-info {
        background: #f8f9fc;
        border-radius: 20px;
        padding: 1rem;
        margin-top: 1rem;
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.5rem;
    }

    .restaurant-info span {
        font-size: 0.85rem;
        color: #6b6b6b;
    }

    /* Сетка меню */
    .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 1.5rem;
        margin: 1.5rem 0;
    }

    /* Карточка продукта */
    .product-card {
        background: #ffffff;
        border-radius: 24px;
        border: 1px solid #f0f2f4;
        padding: 1.2rem;
        transition: 0.2s ease;
    }

    .product-card:hover {
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
    }

    .product-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 0.8rem;
    }

    .product-name {
        font-size: 1.1rem;
        font-weight: 600;
        color: #111;
    }

    .product-price {
        font-weight: 600;
        color: #000;
        background: #f4f6fa;
        padding: 0.2rem 0.7rem;
        border-radius: 30px;
        font-size: 0.85rem;
    }

    .product-description {
        font-size: 0.85rem;
        color: #6b6b6b;
        margin-bottom: 1rem;
        line-height: 1.4;
    }

    /* Управление количеством */
    .quantity-control {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin-top: 0.8rem;
    }

    .quantity-btn {
        width: 32px;
        height: 32px;
        border: 1px solid #e2e6ea;
        background: white;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1.1rem;
        transition: 0.1s;
    }

    .quantity-btn:hover {
        background: #f0f0f0;
    }

    .quantity-value {
        min-width: 35px;
        text-align: center;
        font-weight: 500;
    }

    .add-to-cart-btn {
        width: 100%;
        margin-top: 1rem;
        background: #000;
        color: white;
        border: none;
        padding: 0.7rem;
        font-size: 0.85rem;
        font-weight: 500;
        border-radius: 40px;
        cursor: pointer;
        transition: 0.2s;
    }

    .add-to-cart-btn:hover {
        background: #2c2c2c;
        transform: scale(0.98);
    }

    .add-to-cart-btn.in-cart {
        background: #e6f4ea;
        color: #2e6b2f;
        border: 1px solid #2e6b2f;
    }

    /* Корзина (боковая панель) */
    .cart-sidebar {
        position: fixed;
        right: -450px;
        top: 0;
        width: 450px;
        height: 100vh;
        background: white;
        box-shadow: -2px 0 20px rgba(0, 0, 0, 0.08);
        transition: 0.3s ease;
        z-index: 1000;
        display: flex;
        flex-direction: column;
    }

    .cart-sidebar.open {
        right: 0;
    }

    .cart-header {
        padding: 1.5rem;
        border-bottom: 1px solid #f0f2f5;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .cart-header h2 {
        font-size: 1.3rem;
        font-weight: 550;
    }

    .close-cart {
        background: none;
        border: none;
        font-size: 1.8rem;
        cursor: pointer;
        color: #aaa;
    }

    .close-cart:hover {
        color: #000;
    }

    .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
    }

    .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.8rem 0;
        border-bottom: 1px solid #f0f2f5;
    }

    .cart-item-info {
        flex: 1;
    }

    .cart-item-name {
        font-weight: 500;
        margin-bottom: 0.2rem;
    }

    .cart-item-price {
        font-size: 0.8rem;
        color: #6b6b6b;
    }

    .cart-item-controls {
        display: flex;
        align-items: center;
        gap: 0.8rem;
    }

    .cart-qty-btn {
        width: 28px;
        height: 28px;
        border: 1px solid #e2e6ea;
        background: white;
        border-radius: 10px;
        cursor: pointer;
    }

    .cart-item-total {
        font-weight: 600;
        min-width: 60px;
        text-align: right;
    }

    .remove-item {
        color: #b13b3b;
        cursor: pointer;
        font-size: 1.2rem;
        margin-left: 0.5rem;
    }

    .cart-footer {
        padding: 1.5rem;
        border-top: 1px solid #f0f2f5;
    }

    .cart-total {
        display: flex;
        justify-content: space-between;
        font-size: 1.1rem;
        font-weight: 600;
        margin-bottom: 1rem;
    }

    .order-btn {
        width: 100%;
        background: #000;
        color: white;
        border: none;
        padding: 1rem;
        font-size: 1rem;
        font-weight: 500;
        border-radius: 40px;
        cursor: pointer;
        transition: 0.2s;
    }

    .order-btn:hover {
        background: #2c2c2c;
        transform: scale(0.98);
    }

    .empty-cart {
        text-align: center;
        color: #999;
        padding: 2rem;
    }

    /* Оверлей */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: 999;
        display: none;
    }

    .overlay.show {
        display: block;
    }

    /* Уведомления */
    .toast-message {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #2c2c2c;
        color: white;
        padding: 0.6rem 1.4rem;
        border-radius: 60px;
        font-size: 0.85rem;
        opacity: 0;
        transition: 0.2s;
        pointer-events: none;
        z-index: 1002;
    }

    .toast-message.show {
        opacity: 1;
    }

    /* Адаптивность */
    @media (max-width: 768px) {
        .cart-sidebar {
            width: 100%;
            right: -100%;
        }
        .menu-grid {
            grid-template-columns: 1fr;
        }
        .header h1 {
            font-size: 1.4rem;
        }
    }

    .loading {
        text-align: center;
        padding: 2rem;
        color: #999;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🍽️ Меню ресторана</h1>
    <div class="cart-icon" id="cartIcon">
      <span>🛒 Корзина</span>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>

  <!-- Выбор ресторана -->
  <div class="restaurant-section">
    <div class="restaurant-selector">
      <label>Ресторан:</label>
      <select id="restaurantSelect">
        <option value="">-- Выберите ресторан --</option>
        <option th:each="f : ${food}" th:value="${f.foodid}" th:text="${f.foodname}">Ресторан</option>
      </select>
    </div>
    <div id="restaurantInfo" class="restaurant-info" style="display: none;"></div>
  </div>

  <!-- Сетка меню -->
  <div id="menuContainer">
    <div class="loading">Выберите ресторан, чтобы увидеть меню</div>
  </div>
</div>

<!-- Оверлей -->
<div id="overlay" class="overlay"></div>

<!-- Корзина -->
<div id="cartSidebar" class="cart-sidebar">
  <div class="cart-header">
    <h2>🛒 Корзина</h2>
    <button class="close-cart" id="closeCartBtn">&times;</button>
  </div>
  <div id="cartItems" class="cart-items">
    <div class="empty-cart">Корзина пуста</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Итого:</span>
      <span id="cartTotal">0 ₽</span>
    </div>
    <button class="order-btn" id="orderBtn">Оформить заказ</button>
  </div>
</div>

<div id="toastMsg" class="toast-message"></div>

<script th:inline="javascript">
  /*<![CDATA[*/
  // Данные из бэкенда
  const restaurantsData = /*[[${restorants}]]*/ [];

  // Меню ресторанов (в реальном приложении загружается с сервера)
  const menuData = {
      1: [
          { id: 101, name: "Филадельфия ролл", price: 450, description: "Лосось, сливочный сыр, огурец" },
          { id: 102, name: "Калифорния ролл", price: 420, description: "Краб, авокадо, огурец" },
          { id: 103, name: "Суши сет 'Стандарт'", price: 890, description: "8 штук: лосось, тунец, креветка" },
          { id: 104, name: "Мисо суп", price: 180, description: "С тофу и водорослями" },
          { id: 105, name: "Гунканы с лососем", price: 320, description: "3 штуки" }
      ],
      2: [
          { id: 201, name: "Маргарита", price: 450, description: "Томаты, моцарелла, базилик" },
          { id: 202, name: "Пепперони", price: 520, description: "Острая пепперони, моцарелла" },
          { id: 203, name: "Четыре сыра", price: 580, description: "Смесь итальянских сыров" },
          { id: 204, name: "Карбонара", price: 550, description: "Бекон, яйцо, пармезан" },
          { id: 205, name: "Цезарь с курицей", price: 490, description: "Курица, салат, соус" }
      ],
      3: [
          { id: 301, name: "Классический бургер", price: 320, description: "Говядина, салат, помидор" },
          { id: 302, name: "Чизбургер", price: 370, description: "С двойным сыром" },
          { id: 303, name: "Картофель фри", price: 150, description: "С солью" },
          { id: 304, name: "Наггетсы", price: 220, description: "6 штук" },
          { id: 305, name: "Кола 0.5", price: 120, description: "Напиток" }
      ]
  };
  /*]]>*/
</script>

<script>
  let cart = [];
  let currentRestaurant = null;

  const restaurantSelect = document.getElementById('restaurantSelect');
  const menuContainer = document.getElementById('menuContainer');
  const restaurantInfo = document.getElementById('restaurantInfo');
  const cartSidebar = document.getElementById('cartSidebar');
  const overlay = document.getElementById('overlay');
  const cartIcon = document.getElementById('cartIcon');
  const closeCartBtn = document.getElementById('closeCartBtn');
  const cartItemsDiv = document.getElementById('cartItems');
  const cartTotalSpan = document.getElementById('cartTotal');
  const cartCountSpan = document.getElementById('cartCount');
  const orderBtn = document.getElementById('orderBtn');

  // Показать уведомление
  function showMessage(text, isError = false) {
      const toast = document.getElementById('toastMsg');
      toast.textContent = text;
      toast.style.background = isError ? '#b13b3b' : '#2c2c2c';
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // Открыть корзину
  function openCart() {
      cartSidebar.classList.add('open');
      overlay.classList.add('show');
  }

  // Закрыть корзину
  function closeCart() {
      cartSidebar.classList.remove('open');
      overlay.classList.remove('show');
  }

  // Обновить счетчик корзины
  function updateCartCount() {
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartCountSpan.textContent = totalItems;
  }

  // Обновить корзину (отображение)
  function updateCartDisplay() {
      if (cart.length === 0) {
          cartItemsDiv.innerHTML = '<div class="empty-cart">Корзина пуста</div>';
          cartTotalSpan.textContent = '0 ₽';
          updateCartCount();
          return;
      }

      cartItemsDiv.innerHTML = cart.map(item => `
          <div class="cart-item" data-id="${item.id}">
              <div class="cart-item-info">
                  <div class="cart-item-name">${item.name}</div>
                  <div class="cart-item-price">${item.price} ₽</div>
              </div>
              <div class="cart-item-controls">
                  <button class="cart-qty-btn dec-cart" data-id="${item.id}">-</button>
                  <span>${item.quantity}</span>
                  <button class="cart-qty-btn inc-cart" data-id="${item.id}">+</button>
                  <span class="cart-item-total">${item.price * item.quantity} ₽</span>
                  <span class="remove-item" data-id="${item.id}">✕</span>
              </div>
          </div>
      `).join('');

      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      cartTotalSpan.textContent = `${total} ₽`;
      updateCartCount();

      // Добавляем обработчики для кнопок в корзине
      document.querySelectorAll('.dec-cart').forEach(btn => {
          btn.addEventListener('click', () => {
              const id = parseInt(btn.dataset.id);
              updateCartItemQuantity(id, -1);
          });
      });

      document.querySelectorAll('.inc-cart').forEach(btn => {
          btn.addEventListener('click', () => {
              const id = parseInt(btn.dataset.id);
              updateCartItemQuantity(id, 1);
          });
      });

      document.querySelectorAll('.remove-item').forEach(btn => {
          btn.addEventListener('click', () => {
              const id = parseInt(btn.dataset.id);
              removeFromCart(id);
          });
      });
  }

  // Обновить количество товара в корзине
  function updateCartItemQuantity(id, delta) {
      const itemIndex = cart.findIndex(item => item.id === id);
      if (itemIndex !== -1) {
          const newQuantity = cart[itemIndex].quantity + delta;
          if (newQuantity <= 0) {
              cart.splice(itemIndex, 1);
          } else {
              cart[itemIndex].quantity = newQuantity;
          }
          updateCartDisplay();
          updateProductCardButtons();
      }
  }

  // Удалить товар из корзины
  function removeFromCart(id) {
      cart = cart.filter(item => item.id !== id);
      updateCartDisplay();
      updateProductCardButtons();
  }

  // Добавить в корзину
  function addToCart(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
          existing.quantity++;
      } else {
          cart.push({ ...product, quantity: 1 });
      }
      updateCartDisplay();
      updateProductCardButtons();
      showMessage(`✅ ${product.name} добавлен в корзину`);
  }

  // Обновить состояние кнопок "В корзину" на карточках товаров
  function updateProductCardButtons() {
      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
          const productId = parseInt(btn.dataset.id);
          const inCart = cart.some(item => item.id === productId);
          if (inCart) {
              btn.textContent = '✓ В корзине';
              btn.classList.add('in-cart');
          } else {
              btn.textContent = '➕ В корзину';
              btn.classList.remove('in-cart');
          }
      });
  }

  // Отобразить меню ресторана
  function displayMenu(restaurantId) {
      const menu = menuData[restaurantId];
      if (!menu || menu.length === 0) {
          menuContainer.innerHTML = '<div class="loading">Меню не найдено</div>';
          return;
      }

      menuContainer.innerHTML = `
          <div class="menu-grid">
              ${menu.map(product => `
                  <div class="product-card">
                      <div class="product-header">
                          <span class="product-name">${product.name}</span>
                          <span class="product-price">${product.price} ₽</span>
                      </div>
                      <div class="product-description">${product.description || 'Описание отсутствует'}</div>
                      <div class="quantity-control">
                          <button class="quantity-btn dec-qty" data-id="${product.id}">-</button>
                          <span class="quantity-value" id="qty-${product.id}">1</span>
                          <button class="quantity-btn inc-qty" data-id="${product.id}">+</button>
                      </div>
                      <button class="add-to-cart-btn" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}">➕ В корзину</button>
                  </div>
              `).join('')}
          </div>
      `;

      // Обработчики для кнопок +/-
      document.querySelectorAll('.dec-qty').forEach(btn => {
          btn.addEventListener('click', () => {
              const id = btn.dataset.id;
              const qtySpan = document.getElementById(`qty-${id}`);
              let qty = parseInt(qtySpan.textContent);
              if (qty > 1) {
                  qty--;
                  qtySpan.textContent = qty;
              }
          });
      });

      document.querySelectorAll('.inc-qty').forEach(btn => {
          btn.addEventListener('click', () => {
              const id = btn.dataset.id;
              const qtySpan = document.getElementById(`qty-${id}`);
              let qty = parseInt(qtySpan.textContent);
              qty++;
              qtySpan.textContent = qty;
          });
      });

      // Обработчики для кнопок "В корзину"
      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
          btn.addEventListener('click', () => {
              const id = parseInt(btn.dataset.id);
              const name = btn.dataset.name;
              const price = parseInt(btn.dataset.price);
              const qtySpan = document.getElementById(`qty-${id}`);
              const quantity = parseInt(qtySpan.textContent);

              const product = { id, name, price, quantity };
              addToCart(product);

              // Сбрасываем количество на 1
              qtySpan.textContent = '1';
          });
      });

      updateProductCardButtons();
  }

  // Загрузить информацию о ресторане
  function loadRestaurantInfo(restaurantId) {
      const restaurant = restaurantsData.find(r => r.id == restaurantId);
      if (restaurant) {
          restaurantInfo.style.display = 'flex';
          restaurantInfo.innerHTML = `
              <span>🍽️ ${restaurant.rest_name}</span>
              <span>⏱️ Доставка: ${restaurant.deliveryTime || '30-45 мин'}</span>
              <span>💰 Мин. заказ: ${restaurant.minOrder || 500} ₽</span>
          `;
      } else {
          restaurantInfo.style.display = 'none';
      }
  }

  // Оформить заказ
  function placeOrder() {
      if (!currentRestaurant) {
          showMessage('Выберите ресторан', true);
          return;
      }

      if (cart.length === 0) {
          showMessage('Корзина пуста', true);
          return;
      }

      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const restaurant = restaurantsData.find(r => r.id == currentRestaurant);

      const order = {
          id: Date.now(),
          restaurant: restaurant ? restaurant.rest_name : 'Ресторан',
          date: new Date().toLocaleString('ru-RU'),
          items: cart.map(item => `${item.name} x${item.quantity}`),
          total: total,
          status: 'В обработке'
      };

      // Сохраняем заказ
      const orders = JSON.parse(localStorage.getItem('orders') || '[]');
      orders.unshift(order);
      localStorage.setItem('orders', JSON.stringify(orders));

      showMessage(`✅ Заказ оформлен! Сумма: ${total} ₽`);

      // Очищаем корзину
      cart = [];
      updateCartDisplay();
      closeCart();
  }

  // Обработчик выбора ресторана
  restaurantSelect.addEventListener('change', (e) => {
      const restaurantId = e.target.value;

      if (!restaurantId) {
          menuContainer.innerHTML = '<div class="loading">Выберите ресторан, чтобы увидеть меню</div>';
          restaurantInfo.style.display = 'none';
          currentRestaurant = null;
          cart = [];
          updateCartDisplay();
          return;
      }

      currentRestaurant = parseInt(restaurantId);
      loadRestaurantInfo(restaurantId);
      displayMenu(restaurantId);

      // Очищаем корзину при смене ресторана
      cart = [];
      updateCartDisplay();
  });

  // Обработчики открытия/закрытия корзины
  cartIcon.addEventListener('click', openCart);
  closeCartBtn.addEventListener('click', closeCart);
  overlay.addEventListener('click', closeCart);
  orderBtn.addEventListener('click', placeOrder);

  // Инициализация
  updateCartDisplay();
</script>
</body>
</html>
