<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Регистрация | Минималистичный стиль</title>
  <style>
    /* Глобальный сброс и базовая настройка — чистый минимализм */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: #ffffff;   /* идеально белый фон */
        font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        line-height: 1.4;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
    }

    /* Карточка регистрации — едва заметная тень только для лёгкого объёма, но фон остаётся белым */
    .register-card {
        max-width: 420px;
        width: 100%;
        background: #ffffff;
        border-radius: 24px;
        padding: 2rem 1.8rem 2.2rem 1.8rem;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 6px rgba(0, 0, 0, 0.02);
        transition: all 0.2s ease;
    }

    /* Заголовок — только нужный акцент */
    .register-title {
        font-size: 1.9rem;
        font-weight: 550;
        letter-spacing: -0.3px;
        margin-bottom: 0.5rem;
        color: #111;
    }

    .register-sub {
        font-size: 0.9rem;
        color: #6b6b6b;
        margin-bottom: 2rem;
        border-left: 2px solid #eaeef2;
        padding-left: 0.75rem;
    }

    /* Группы полей — максимально чистые */
    .input-group {
        margin-bottom: 1.5rem;
    }

    label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: #2c2c2c;
        letter-spacing: -0.2px;
    }

    /* Поля ввода: минималистичные, без лишних теней */
    input {
        width: 100%;
        padding: 0.85rem 0.9rem;
        font-size: 1rem;
        font-family: inherit;
        background: #ffffff;
        border: 1px solid #e2e6ea;
        border-radius: 16px;
        transition: 0.2s ease;
        outline: none;
        color: #111;
    }

    input:focus {
        border-color: #a0a8b2;
        box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.02);
        /* микро-акцент, но без цветных подсветок, чтобы сохранить нейтральность */
    }

    /* Стиль для плейсхолдера — едва заметный */
    input::placeholder {
        color: #bcbcbc;
        font-weight: 400;
        font-size: 0.95rem;
    }

    /* Блок выбора роли (регистрации): радиокнопки в минималистичном оформлении */
    .role-group {
        margin-bottom: 1.8rem;
    }

    .role-label {
        margin-bottom: 0.8rem;
    }

    .role-options {
        display: flex;
        gap: 1.8rem;
        flex-wrap: wrap;
        align-items: center;
    }

    .role-option {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 0.95rem;
        color: #1f1f1f;
        background: #ffffff;
        padding: 0.35rem 0;
    }

    /* Кастомный минимализм для радио — только необходимые изменения */
    .role-option input[type="radio"] {
        appearance: none;
        width: 1.1rem;
        height: 1.1rem;
        border: 1.5px solid #cbd5e1;
        border-radius: 50%;
        margin: 0;
        padding: 0;
        background: white;
        transition: 0.1s linear;
        position: relative;
        cursor: pointer;
    }

    .role-option input[type="radio"]:checked {
        border-color: #2c2c2c;
        background-color: #ffffff;
    }

    .role-option input[type="radio"]:checked::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 0.55rem;
        height: 0.55rem;
        background: #1f1f1f;
        border-radius: 50%;
    }

    .role-option input[type="radio"]:focus {
        outline: none;
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.05);
    }

    /* Кнопка — лёгкая, но с понятным действием */
    .register-btn {
        width: 100%;
        background: #000000;
        color: white;
        border: none;
        padding: 0.9rem 1rem;
        font-size: 1rem;
        font-weight: 500;
        font-family: inherit;
        border-radius: 40px;
        cursor: pointer;
        transition: 0.2s ease;
        margin-top: 0.5rem;
        margin-bottom: 1rem;
        letter-spacing: -0.2px;
    }

    .register-btn:hover {
        background: #2c2c2c;
        transform: scale(0.98);
    }

    .register-btn:active {
        background: #111;
        transform: scale(0.97);
    }

    /* сообщение после отправки (обратная связь) */
    .message-area {
        margin-top: 1.2rem;
        font-size: 0.85rem;
        text-align: center;
        color: #2c6e2c;
        background: #f9f9f9;
        padding: 0.7rem;
        border-radius: 60px;
        opacity: 0;
        transition: opacity 0.2s;
        font-weight: 450;
    }

    .message-area.show {
        opacity: 1;
    }

    .message-area.error {
        color: #b13b3b;
        background: #fef6f6;
    }

    /* разделитель для лёгкого воздуха */
    hr {
        margin: 1.2rem 0 0.2rem;
        border: none;
        border-top: 1px solid #f0f0f0;
    }

    /* адаптивность */
    @media (max-width: 480px) {
        .register-card {
            padding: 1.6rem;
        }
        .register-title {
            font-size: 1.7rem;
        }
        .role-options {
            gap: 1.2rem;
        }
    }
  </style>
</head>
<body>

<div class="register-card">
  <div class="register-title">создать аккаунт курьера</div>

  <!-- Форма регистрации: поля логин, пароль, выбор роли -->
  <form id="registrationForm" action="/courier_registration" method="post">
    <!-- Поле логин -->
    <div class="input-group">
      <label for="login">логин</label>
      <input type="text" id="login" name="login" placeholder="@login" autocomplete="username" required>
    </div>

    <!-- Поле пароль -->
    <div class="input-group">
      <label for="password">пароль</label>
      <input type="password" id="password" name="password" placeholder="password" autocomplete="new-password" required>
    </div>

    <div class="input-group">
      <label for="password">ФИО</label>
      <input type="text" id="password" name="name" placeholder="name" autocomplete="new-password" required>
    </div>

    <div class="input-group">
      <label for="password">номер телефона</label>
      <input type="text" id="password" name="phone" placeholder="phone" autocomplete="new-password" required>
    </div>

    <button type="submit" class="register-btn">зарегистрироваться</button>
  </form>
</div>
</body>
</html>
